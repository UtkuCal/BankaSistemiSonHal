<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Giriş Yap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f5f5f5; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .login-form { width: 100%; max-width: 330px; padding: 15px; margin: auto; }
  </style>
</head>
<body>

<main class="login-form text-center card shadow">
  <div class="card-body">
    <form th:action="@{/login}" method="post">
      <h1 class="h3 mb-3 fw-normal">Lütfen Giriş Yapın</h1>

      <div th:if="${param.error}" class="alert alert-danger">
        Hatalı kullanıcı adı veya şifre!
      </div>

      <div th:if="${param.logout}" class="alert alert-success">
        Başarıyla çıkış yaptınız.
      </div>

      <div class="form-floating mb-2">
        <input type="text" name="username" class="form-control" id="uName" placeholder="Müşteri NO" required>
        <label for="uName">Müşteri Numaranız</label>
      </div>
      <div class="form-floating mb-3">
        <input type="password" name="password" class="form-control" id="uPass" placeholder="Şifre" required>
        <label for="uPass">Şifre</label>
      </div>

      <button class="w-100 btn btn-lg btn-primary mb-2" type="submit">Giriş Yap</button>
    </form>

    <a th:href="@{/}" class="w-100 btn btn-lg btn-secondary">Ana Sayfaya Dön</a>

    <p class="mt-4 mb-1 text-muted">&copy; 2026 - Bank Management</p>
  </div>
</main>

</body>
</html>
