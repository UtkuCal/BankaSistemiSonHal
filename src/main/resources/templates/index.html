<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Banka Yönetim Sistemi - Ana Sayfa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .hero-section {
        background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1501167786227-4cba60f6d58f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1470&q=80');
        background-size: cover;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        text-align: center;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">BANKA SİSTEMİ</a>
    <div class="navbar-nav ms-auto">
      <a sec:authorize="!isAuthenticated()" class="btn btn-primary" th:href="@{/login}">Giriş Yap</a>
      <a sec:authorize="isAuthenticated()" class="btn btn-outline-light me-2" th:href="@{/customer/list}">Yönetim Paneli</a>
      <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-danger">Çıkış</button>
      </form>
    </div>
  </div>
</nav>

<div class="hero-section">
  <div>
    <h1 class="display-3 fw-bold">YENİ BİR BANKACILIK DENEYİMİ</h1>
    <p class="lead">Güvenli, Hızlı ve Modern Banka Yönetimi.</p>
    <div sec:authorize="!isAuthenticated()">
      <a th:href="@{/login}" class="btn btn-lg btn-primary px-5">Hemen Başla</a>
    </div>
  </div>
</div>


</body>
</html>
