<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Müşteri Listesi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="bg-light shadow-sm mb-4">
  <div class="container d-flex justify-content-between align-items-center py-2">
    <div class="nav nav-pills">
      <a class="nav-link active" href="/customer/list">Müşteriler</a>
      <a class="nav-link" href="/account/list">Hesaplar</a>
      <a class="nav-link" href="/depositor/list">Mevduat Sahipleri</a>
      <a sec:authorize="hasRole('USER')" class="nav-link" href="/transfer">Transfer</a>
    </div>

    <div sec:authorize="isAuthenticated()">
      <div class="bg-white border rounded-pill px-3 py-1 d-flex align-items-center">
        <span class="fw-bold me-2" sec:authentication="name">Kullanıcı İsmi</span>
        <span class="badge rounded-pill bg-primary me-2" style="font-size: 0.7rem;" sec:authorize="hasRole('ADMIN')">ADMIN</span>
        <span class="badge rounded-pill bg-secondary me-2" style="font-size: 0.7rem;" sec:authorize="hasRole('USER')">USER</span>
        <form th:action="@{/logout}" method="post" class="m-0">
          <button type="submit" class="btn btn-sm btn-link text-danger p-0 text-decoration-none">Çıkış</button>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Müşteri Listesi</h2>
    <a sec:authorize="hasRole('ADMIN')" href="/customer/add" class="btn btn-primary">Yeni Müşteri Ekle</a>
  </div>

  <table class="table table-striped table-hover shadow-sm">
    <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Rol</th>
      <th>Profil</th>
      <th>İsim</th>
      <th>Şehir</th>
      <th>Adres</th>
      <th sec:authorize="hasRole('ADMIN')">İşlemler</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="customer : ${customers}">
      <td th:text="${customer.id}"></td>
      <td th:text="${customer.role}"></td>
      <td>
        <img th:if="${customer.profileImage}" th:src="@{'/uploads/' + ${customer.profileImage}}"
             width="40" height="40" class="rounded-circle">
      </td>
      <td th:text="${customer.name}"></td>
      <td th:text="${customer.city}"></td>
      <td th:text="${customer.address}"></td>
      <td sec:authorize="hasRole('ADMIN')">
        <a th:href="@{/customer/edit/{id}(id=${customer.id})}" class="btn btn-sm btn-warning">Düzenle</a>
        <a th:href="@{/customer/delete/{id}(id=${customer.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Bu müşteriyi silmek istediğinize emin misiniz?');">Sil</a>
      </td>
    </tr>
    </tbody>
  </table>
</div>

</body>
</html>
