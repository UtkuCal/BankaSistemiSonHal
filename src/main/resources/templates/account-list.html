<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Hesap Listesi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="bg-light shadow-sm mb-4">
    <div class="container d-flex justify-content-between align-items-center py-2">
        <div class="nav nav-pills">
            <a class="nav-link" href="/customer/list">Müşteriler</a>
            <a class="nav-link active" href="/account/list">Hesaplar</a>
            <a class="nav-link" href="/depositor/list">Mevduat Sahipleri</a>
            <a sec:authorize="hasRole('USER')" class="nav-link" href="/transfer">Transfer</a>
        </div>

        <div sec:authorize="isAuthenticated()">
            <div class="bg-white border rounded-pill px-3 py-1 d-flex align-items-center">
                <span class="fw-bold me-2" sec:authentication="name">Kullanıcı İsmi</span>
                <span class="badge rounded-pill bg-primary me-2" style="font-size: 0.7rem;" sec:authorize="hasRole('ADMIN')">ADMIN</span>
                <span class="badge rounded-pill bg-secondary me-2" style="font-size: 0.7rem;" sec:authorize="hasRole('USER')">USER</span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-sm btn-link text-danger p-0 text-decoration-none">Çıkış</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Hesap Listesi</h2>
        <a sec:authorize="hasRole('ADMIN')" href="/account/add" class="btn btn-primary">Yeni Hesap Aç</a>
    </div>

    <table class="table table-bordered shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>Hesap No (ID)</th>
            <th>Şube Adı</th>
            <th>Bakiye</th>
            <th>İşlemler</th> </tr>
        </thead>
        <tbody>
        <tr th:each="account : ${accounts}">
            <td th:text="${account.id}"></td>
            <td th:text="${account.branch}"></td>
            <td th:text="${account.balance}"></td>
            <td> <button type="button" class="btn btn-sm btn-warning edit-button"
                         th:data-id="${account.id}"
                         th:data-branch="${account.branch}"
                         th:data-balance="${account.balance}"
                         data-bs-toggle="modal" data-bs-target="#editAccountModal">
                Düzenle
            </button>
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/account/delete/{id}(id=${account.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Bu hesabı silmek istediğinize emin misiniz?');">Sil</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div class="modal fade" id="editAccountModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning">
                <h5 class="modal-title" id="editModalLabel">Hesap Bilgilerini Düzenle</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="editForm" method="post">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Şube Adı</label>
                        <input type="text" class="form-control" id="modalBranch" name="branch" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Bakiye</label>
                        <input type="number" step="0.01" class="form-control" id="modalBalance" name="balance" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Kapat</button>
                    <button type="submit" class="btn btn-warning">Değişiklikleri Kaydet</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Butona tıklandığında modal içindeki alanları dolduran script
    document.querySelectorAll('.edit-button').forEach(button => {
        button.addEventListener('click', function() {
            const id = this.getAttribute('data-id');
            const branch = this.getAttribute('data-branch');
            const balance = this.getAttribute('data-balance');

            // Formun action URL'ini dinamik olarak ayarla
            document.getElementById('editForm').action = '/account/edit/' + id;

            // Modal içindeki inputları doldur
            document.getElementById('modalBranch').value = branch;
            document.getElementById('modalBalance').value = balance;
        });
    });
</script>

</body>
</html>
