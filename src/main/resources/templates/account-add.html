<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Yeni Hesap Ekle</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-success text-white"><h4 class="mb-0">Yeni Hesap Kaydı</h4></div>
        <div class="card-body">
          <form th:action="@{/account/add}" th:object="${accountDTO}" method="post">
            <div class="mb-3">
              <label class="form-label">Şube Adı</label>
              <input type="text" class="form-control" th:field="*{branch}" required>
            </div>
            <div class="mb-4">
              <label class="form-label">Başlangıç Bakiyesi</label>
              <input type="number" step="0.01" class="form-control" th:field="*{balance}" required>
            </div>
            <div class="d-flex justify-content-between">
              <a th:href="@{/account/list}" class="btn btn-secondary">İptal</a>
              <button type="submit" class="btn btn-success">Kaydet</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
