<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Müşteri ve Hesap Eşleştir</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-success text-white"><h4 class="mb-0">Müşteri - Hesap Bağla</h4></div>
        <div class="card-body">
          <form th:action="@{/depositor/link}" th:object="${depositorDTO}" method="post">
            <div class="mb-3">
              <label class="form-label">Müşteri ID</label>
              <input type="number" class="form-control" th:field="*{customerId}" required>
            </div>
            <div class="mb-4">
              <label class="form-label">Hesap ID</label>
              <input type="number" class="form-control" th:field="*{accountId}" required>
            </div>
            <div class="d-flex justify-content-between">
              <a th:href="@{/depositor/list}" class="btn btn-secondary">İptal</a>
              <button type="submit" class="btn btn-success">Eşleştir</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
