<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Yeni Müşteri Ekle / Düzenle</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-success text-white">
          <h4 class="mb-0">Müşteri Formu</h4>
        </div>
        <div class="card-body">
          <form th:action="@{/customer/add}" th:object="${customerDTO}" method="post" enctype="multipart/form-data">

            <input type="hidden" th:field="*{id}" />

            <input type="hidden" th:field="*{profileImage}" />

            <div class="mb-3">
              <label class="form-label">İsim Soyisim</label>
              <input type="text" class="form-control" th:field="*{name}" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Şehir</label>
              <input type="text" class="form-control" th:field="*{city}" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Adres</label>
              <textarea class="form-control" th:field="*{address}" rows="2" required></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Müşteri Rolü</label>
              <select class="form-select" th:field="*{role}" required>
                <option value="USER">USER</option>
                <option value="ADMIN">ADMIN</option>
              </select>
            </div>

            <div class="mb-4">
              <label class="form-label">Profil Resmi</label>

              <div th:if="*{profileImage}" class="mb-2 d-flex align-items-center">
                <img th:src="@{'/uploads/' + *{profileImage}}" alt="Mevcut Resim"
                     width="50" height="50" class="rounded-circle shadow-sm me-3 object-fit-cover">
                <small class="text-muted">Mevcut resim. Sadece değiştirmek isterseniz yeni dosya seçin.</small>
              </div>

              <input type="file" class="form-control" name="imageFile" accept="image/*">
            </div>

            <div class="d-flex justify-content-between">
              <a th:href="@{/customer/list}" class="btn btn-secondary">İptal</a>
              <button type="submit" class="btn btn-success">Kaydet</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
